<div class="container mt-4">
  <h2 class="mb-4">Add Trip</h2>

  <form [formGroup]="addForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Code</label>
      <input class="form-control" formControlName="code">
    </div>

    <div class="mb-3">
      <label class="form-label">Name</label>
      <input class="form-control" formControlName="name">
    </div>

    <div class="mb-3">
      <label class="form-label">Length</label>
      <input class="form-control" formControlName="length">
    </div>

    <div class="mb-3">
      <label class="form-label">Start</label>
      <input class="form-control" formControlName="start">
    </div>

    <div class="mb-3">
      <label class="form-label">Resort</label>
      <input class="form-control" formControlName="resort">
    </div>

    <div class="mb-3">
      <label class="form-label">Per Person</label>
      <input type="number" class="form-control" formControlName="perPerson">
    </div>

    <div class="mb-3">
      <label class="form-label">Image</label>
      <input class="form-control" formControlName="image">
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea class="form-control" rows="4" formControlName="description"></textarea>
    </div>

    <button type="submit" class="btn btn-success">Save Trip</button>
  </form>
</div>
